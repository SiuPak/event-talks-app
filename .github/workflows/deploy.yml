name: Deploy static Release Hub to GitHub Pages

on:
  schedule:
    # Run once every hour to sync the latest release notes
    - cron: '0 * * * *'
  push:
    # Trigger on any push to the main branch
    branches:
      - main
  workflow_dispatch:
    # Allow manual trigger from the GitHub actions tab

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch and compile feed data to JSON
        run: |
          python tools/parse_feed.py

      - name: Prepare static distribution folder
        run: |
          mkdir -p dist
          # Copy index.html from templates folder to the root of static site
          cp templates/index.html dist/index.html
          # Copy the static assets folder containing styles, scripts, and compiled JSON
          cp -r static dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
